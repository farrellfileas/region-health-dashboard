name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - 'app/frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/frontend/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  build-push-sha:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to OCIR
        run: echo "${{ secrets.OCIR_TOKEN }}" | docker login ${{ secrets.OCIR_REGISTRY }} -u ${{ secrets.OCIR_USERNAME }} --password-stdin

      - name: Build and push frontend image
        run: |
          IMAGE=${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_NAMESPACE }}/region-health/frontend
          TAG=${GITHUB_SHA::7}
          docker build -t $IMAGE:$TAG app/frontend
          docker push $IMAGE:$TAG

  scan:
    runs-on: ubuntu-latest
    needs: build-push-sha
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Log in to OCIR
        run: echo "${{ secrets.OCIR_TOKEN }}" | docker login ${{ secrets.OCIR_REGISTRY }} -u ${{ secrets.OCIR_USERNAME }} --password-stdin

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
        id: vars

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_NAMESPACE }}/region-health/frontend:${{ steps.vars.outputs.TAG }}
          format: table
          exit-code: "1"
          severity: CRITICAL

  push-latest:
    runs-on: ubuntu-latest
    needs: scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to OCIR
        run: echo "${{ secrets.OCIR_TOKEN }}" | docker login ${{ secrets.OCIR_REGISTRY }} -u ${{ secrets.OCIR_USERNAME }} --password-stdin

      - name: Build and push frontend image
        run: |
          IMAGE=${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_NAMESPACE }}/region-health/frontend
          TAG=${GITHUB_SHA::7}
          docker pull $IMAGE:$TAG
          docker tag $IMAGE:$TAG $IMAGE:latest
          docker push $IMAGE:latest

  update-app-version:
    runs-on: ubuntu-latest
    needs: scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: update-frontend-version
        run: |
          sed -i "s|region-health/frontend:.*|region-health/frontend:${GITHUB_SHA::7}|" k8s/base/frontend/deployment.yaml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add k8s/base/frontend/deployment.yaml
          git commit -m "ci: update frontend image to ${GITHUB_SHA::7}"
          git push
