datasources:
 datasources.yaml:
   apiVersion: 1
   datasources:
   - name: Prometheus
     type: prometheus
     url: http://prometheus-server.region-health.svc.cluster.local
     access: proxy
     isDefault: true
   - name: Loki
     type: loki
     url: http://loki-gateway.region-health.svc.cluster.local
     access: proxy
     jsonData:
       httpHeaderName1: "X-Scope-OrgId"
     secureJsonData:
       httpHeaderValue1: "loki"

persistence:
  enabled: true
  size: 5Gi

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    api-observability:
      json: |
        {
          "annotations": {
            "list": [
              {
                "builtIn": 1,
                "datasource": {
                  "type": "grafana",
                  "uid": "-- Grafana --"
                },
                "enable": true,
                "hide": true,
                "iconColor": "rgba(0, 211, 255, 1)",
                "name": "Annotations & Alerts",
                "type": "dashboard"
              }
            ]
          },
          "editable": true,
          "fiscalYearStartMonth": 0,
          "graphTooltip": 0,
          "id": 0,
          "links": [],
          "panels": [
            {
              "fieldConfig": {
                "defaults": {},
                "overrides": []
              },
              "gridPos": {
                "h": 7,
                "w": 24,
                "x": 0,
                "y": 0
              },
              "id": 5,
              "options": {
                "code": {
                  "language": "plaintext",
                  "showLineNumbers": false,
                  "showMiniMap": false
                },
                "content": "## API Observability\n\nMonitors SLO compliance for the OCI Region Health API.\n\n**SLO:** 99.9% success rate over 28-day rolling window  \n**Error budget:** 43 minutes/month  \n**Alerts:** Burn rate > 14 (critical, 2-day exhaustion) | Burn rate > 6 (warning, 4.6-day exhaustion)\n> **Note:** `/error` endpoint is a synthetic test endpoint that returns 500 randomly ~50% of the time. \n> Used to validate alerting and SLO burn rate behavior. Not a production endpoint.\n\nData sources: Prometheus (metrics) · Loki (logs)",
                "mode": "markdown"
              },
              "pluginVersion": "12.3.1",
              "title": "API SLOs",
              "type": "text"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "PBFA97CFB590B2093"
              },
              "fieldConfig": {
                "defaults": {
                  "color": {
                    "mode": "palette-classic"
                  },
                  "custom": {
                    "axisBorderShow": false,
                    "axisCenteredZero": false,
                    "axisColorMode": "text",
                    "axisLabel": "",
                    "axisPlacement": "auto",
                    "barAlignment": 0,
                    "barWidthFactor": 0.6,
                    "drawStyle": "line",
                    "fillOpacity": 0,
                    "gradientMode": "none",
                    "hideFrom": {
                      "legend": false,
                      "tooltip": false,
                      "viz": false
                    },
                    "insertNulls": false,
                    "lineInterpolation": "linear",
                    "lineWidth": 1,
                    "pointSize": 5,
                    "scaleDistribution": {
                      "type": "linear"
                    },
                    "showPoints": "auto",
                    "showValues": false,
                    "spanNulls": false,
                    "stacking": {
                      "group": "A",
                      "mode": "none"
                    },
                    "thresholdsStyle": {
                      "mode": "off"
                    }
                  },
                  "mappings": [],
                  "max": 100,
                  "thresholds": {
                    "mode": "absolute",
                    "steps": [
                      {
                        "color": "green",
                        "value": 0
                      },
                      {
                        "color": "red",
                        "value": 80
                      }
                    ]
                  },
                  "unit": "percent"
                },
                "overrides": []
              },
              "gridPos": {
                "h": 8,
                "w": 24,
                "x": 0,
                "y": 7
              },
              "id": 3,
              "options": {
                "legend": {
                  "calcs": [],
                  "displayMode": "list",
                  "placement": "bottom",
                  "showLegend": true
                },
                "tooltip": {
                  "hideZeros": false,
                  "mode": "single",
                  "sort": "none"
                }
              },
              "pluginVersion": "12.3.1",
              "targets": [
                {
                  "editorMode": "code",
                  "expr": "(sum by(handler) (rate(http_requests_total{status=\"2xx\", handler!=\"/metrics\"}[5m]))\r\n/\r\nsum by(handler) (rate(http_requests_total{handler!=\"/metrics\"}[5m]))) * 100",
                  "legendFormat": "__auto",
                  "range": true,
                  "refId": "A"
                }
              ],
              "title": "API Success Rates by endpoint",
              "type": "timeseries"
            },
            {
              "datasource": {
                "type": "loki",
                "uid": "P8E80F9AEF21F6940"
              },
              "fieldConfig": {
                "defaults": {},
                "overrides": []
              },
              "gridPos": {
                "h": 11,
                "w": 24,
                "x": 0,
                "y": 15
              },
              "id": 4,
              "options": {
                "dedupStrategy": "none",
                "enableInfiniteScrolling": false,
                "enableLogDetails": true,
                "showControls": false,
                "showTime": false,
                "sortOrder": "Descending",
                "wrapLogMessage": false
              },
              "pluginVersion": "12.3.1",
              "targets": [
                {
                  "datasource": {
                    "type": "loki",
                    "uid": "P8E80F9AEF21F6940"
                  },
                  "direction": "backward",
                  "editorMode": "code",
                  "expr": "{container=\"api\", namespace=\"region-health\"} | json | level=\"error\"",
                  "queryType": "range",
                  "refId": "A"
                }
              ],
              "title": "Error logs from API container",
              "type": "logs"
            }
          ],
          "preload": false,
          "refresh": "auto",
          "schemaVersion": 42,
          "tags": [],
          "templating": {
            "list": []
          },
          "time": {
            "from": "now-1h",
            "to": "now"
          },
          "timepicker": {},
          "timezone": "browser",
          "title": "API Metrics",
          "uid": "adj9dx2",
          "version": 16
        }